# Supply-chain hardening
# Dep install/postinstall scripts are blocked by default and only run for
# packages listed in `allowBuilds` (formerly `pnpm.onlyBuiltDependencies` in
# package.json). Our own root scripts still run.

# Refuse to install packages published less than this many minutes ago.
# (1440 = 24h is the pnpm 11 default — gives time for malicious uploads
# to be detected and yanked. Set to 0 to disable.)
# minimumReleaseAge: 1440

# Don't silently install if engines (node/pnpm) don't match.
engineStrict: true

# Don't auto-install peer deps we never asked for.
autoInstallPeers: true

# Use npm-style flat node_modules layout. Required for MUI's Theme module
# augmentation and @sentry/react's re-exports to resolve correctly under
# TypeScript. We lose pnpm's strict-tree (phantom-dep detection) but keep
# all the supply-chain wins (script blocking, min release age, patches).
nodeLinker: hoisted

allowBuilds:
  # Previously had no builds allowed (pnpm.onlyBuiltDependencies: []).
  # eslint-import-resolver-typescript transitive — falls back to JS resolver.
  unrs-resolver: false
